<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Heart</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    position: relative;
    width: 600px;
    height: 600px;
}

.text {
    position: absolute;
    color: red;
    font-size: 22px; /* трохи більший текст */
    font-family: Arial, sans-serif;
    text-shadow: 0 0 12px red;
    white-space: nowrap;
}
</style>
</head>

<body>

<div class="container" id="heart"></div>

<script>
const heart = document.getElementById("heart");
const elements = [];
const total = 200; // більше написів = чіткіший контур

for (let i = 0; i < total; i++) {
    let span = document.createElement("div");
    span.className = "text";
    span.innerText = "I love you";
    heart.appendChild(span);
    elements.push(span);
}

function animate() {
    let time = Date.now() * 0.0001; // повільніше (було 0.002)

    elements.forEach((el, i) => {
        let t = (i / total) * Math.PI * 2 + time;

        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = -(13 * Math.cos(t) 
                - 5 * Math.cos(2*t) 
                - 2 * Math.cos(3*t) 
                - Math.cos(4*t));

        el.style.left = (300 + x * 18) + "px"; // більше масштабування
        el.style.top = (300 + y * 18) + "px";
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
